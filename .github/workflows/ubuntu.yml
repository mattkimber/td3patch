name: Build (Ubuntu)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:

      - name: Set up Go 1.x
        uses: actions/setup-go@v2
        with:
          go-version: ^1.21
        id: go

      - name: Check out code into the Go module directory
        uses: actions/checkout@v2

      - name: Vet
        run: go vet -v ./...

      - name: Build
        run: go build -v ./main/td3patch.go

      - name: Create artifact dir
        run: mkdir -p output

      - name: Move artifacts
        run: mv ./td3patch README.md LICENCE output/

      - uses: actions/upload-artifact@v4
        with:
          name: td3patch-ubuntu
          path: output/*