name: Build (Windows)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  build:
    name: Build
    runs-on: windows-latest
    steps:

      - name: Set up Go 1.x
        uses: actions/setup-go@v2
        with:
          go-version: ^1.21
        id: go

      - name: Check out code into the Go module directory
        uses: actions/checkout@v2

      - name: Vet
        run: go vet -v ./...

      - name: Build
        run: go build -v ./main/td3patch.go

      - name: Create artifact dir
        run: mkdir output

      - name: Move artifacts
        run: |
          move td3patch.exe output
          move README.md output
          move LICENCE output

      - uses: actions/upload-artifact@v4
        with:
          name: td3patch-windows
          path: output/*